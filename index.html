const formatCurrency = (value) => {
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 0,
    maximumFractionDigits: 0,
  }).format(value);
};

const formatNumber = (value) => {
  return new Intl.NumberFormat('en-US', { maximumFractionDigits: 1 }).format(value);
};

const TARGET_UTIL = 80;
const getUtilColor = (pct) => {
  if (pct > 130) return { text: 'text-red-600', bg: 'bg-red-50', border: 'border-red-200', label: 'Overloaded' };
  if (pct > 100) return { text: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-200', label: 'OT Risk' };
  if (pct >= 80) return { text: 'text-green-600', bg: 'bg-green-50', border: 'border-green-200', label: 'On Target' };
  if (pct >= 60) return { text: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-200', label: 'Under Target' };
  if (pct >= 40) return { text: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-200', label: 'Low' };
  return { text: 'text-red-600', bg: 'bg-red-50', border: 'border-red-200', label: 'Critical' };
};

const getConfidenceBadge = (score) => {
  if (score === 100) return { label: 'Exact', color: 'bg-green-100 text-green-700 border-green-300' };
  if (score >= 90) return { label: 'High', color: 'bg-blue-100 text-blue-700 border-blue-300' };
  if (score >= 80) return { label: 'Medium', color: 'bg-yellow-100 text-yellow-700 border-yellow-300' };
  return { label: 'Low', color: 'bg-red-100 text-red-700 border-red-300' };
};

                        rate < 75 ? 'bg-yellow-100 text-yellow-700' :
                        'bg-green-100 text-green-700';
                      return (
                        <React.Fragment key={emp.name}>
                          <tr className={`border-b border-slate-100 hover:bg-slate-50 transition cursor-pointer ${isExpanded ? 'bg-blue-50/30' : ''} ${rate === 0 && emp.applicable_days >= 5 ? 'bg-red-50/40' : ''}`}
                              onClick={() => setExpandedLunchEmployee(isExpanded ? null : emp.name)}>
                            <td className="px-4 py-3 font-medium text-slate-900">{emp.name}</td>
                            <td className="px-3 py-3 text-xs text-slate-500">{emp.job_title || '—'}</td>
                            <td className="text-center px-3 py-3 text-slate-700">{emp.applicable_days}</td>
                            <td className="text-center px-3 py-3">
                              <span className="text-green-600 font-semibold">{emp.days_with_lunch}</span>
                            </td>
                            <td className="text-center px-3 py-3">
                              {emp.days_without_lunch > 0 ? (
                                <span className="text-red-600 font-bold">{emp.days_without_lunch}</span>
                              ) : (
                                <span className="text-slate-400">0</span>
                              )}
                            </td>
                            <td className="text-center px-3 py-3">
                              {emp.days_short_lunch > 0 ? (
                                <span className="text-orange-600 font-semibold">{emp.days_short_lunch}</span>
                              ) : (
                                <span className="text-slate-400">0</span>
                              )}
                            </td>
                            <td className="text-center px-3 py-3">
                              <span className={`inline-block px-2.5 py-1 rounded-full text-xs font-bold ${compColor}`}>
                                {rate.toFixed(0)}%
                              </span>
                            </td>
                            <td className="px-3 py-3 text-center">
                              {isExpanded ? <ChevronDown size={16} className="text-slate-400" /> : <ChevronRight size={16} className="text-slate-400" />}
                            </td>
                          </tr>
                          {isExpanded && (
                            <tr className="bg-blue-50/50 border-b border-slate-200">
                              <td colSpan="8" className="px-4 py-3">
                                <div className="max-h-72 overflow-y-auto">
                                  <table className="w-full text-xs">
                                    <thead className="sticky top-0 bg-blue-100 z-10">
                                      <tr>
                                        <th className="text-left px-2 py-1.5 font-semibold text-slate-700">Date</th>
                                        <th className="text-center px-2 py-1.5 font-semibold text-slate-700">Shift</th>
                                        <th className="text-right px-2 py-1.5 font-semibold text-slate-700">Hours</th>
                                        <th className="text-center px-2 py-1.5 font-semibold text-slate-700">Status</th>
                                        <th className="text-center px-2 py-1.5 font-semibold text-slate-700">Lunch Break</th>
                                        <th className="text-center px-2 py-1.5 font-semibold text-slate-700">Punches</th>
                                      </tr>
                                    </thead>
                                    <tbody>
                                      {emp.days.map((day, di) => {
                                        const statusBadge = day.status === 'compliant' ? { label: 'Yes', cls: 'bg-green-100 text-green-700' } :
                                          day.status === 'violation' ? { label: 'No Lunch', cls: 'bg-red-100 text-red-700 font-bold' } :
                                          day.status === 'warning' ? { label: 'Warning', cls: 'bg-orange-100 text-orange-700' } :
                                          day.status === 'short_lunch' ? { label: `${day.lunch_min}min`, cls: 'bg-yellow-100 text-yellow-700' } :
                                          { label: 'N/A', cls: 'bg-slate-100 text-slate-400' };
                                        return (
                                          <tr key={di} className={`border-b border-blue-100 ${day.status === 'violation' ? 'bg-red-50/40' : ''}`}>
                                            <td className="px-2 py-1.5 text-slate-700">{day.d}</td>
                                            <td className="text-center px-2 py-1.5 text-slate-600">{day.start && day.end ? `${day.start} - ${day.end}` : '—'}</td>
                                            <td className={`text-right px-2 py-1.5 font-semibold ${day.h > 7.5 ? 'text-red-600' : 'text-slate-800'}`}>{day.h.toFixed(2)}</td>
                                            <td className="text-center px-2 py-1.5">
                                              <span className={`inline-block px-2 py-0.5 rounded text-xs font-semibold ${statusBadge.cls}`}>{statusBadge.label}</span>
                                            </td>
                                            <td className="text-center px-2 py-1.5 text-slate-600">{day.lunch_time || (day.reason ? <span className="text-red-500 text-xs">{day.reason}</span> : '—')}</td>
                                            <td className="text-center px-2 py-1.5 text-slate-500">{day.punches}</td>
                                          </tr>
                                        );
                                      })}
                                    </tbody>
                                  </table>
                                </div>
                              </td>
                            </tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ============ RECOMMENDATIONS TAB ============ */}
        {activeTab === 'recommendations' && (
          <div className="space-y-4">
            <div className="bg-white rounded-xl shadow-sm p-6">
              <h2 className="text-lg font-bold text-slate-900 mb-1">Efficiency Recommendations</h2>
              <p className="text-sm text-slate-500 mb-6">{staffingData.flags.length} issues identified across {new Set(staffingData.flags.map(f => f.employee)).size} employees</p>

              {Object.entries(flagsByType).map(([type, flags]) => {
                const meta = FLAG_LABELS[type] || { label: type, color: 'text-slate-600' };
                return (
                  <div key={type} className="mb-6">
                    <h3 className={`font-bold text-sm uppercase tracking-wide mb-3 ${meta.color}`}>
                      {meta.label} ({flags.length})
                    </h3>
                    <div className="space-y-2">
                      {flags.map((flag, i) => (
                        <div
                          key={i}
                          className={`flex items-start gap-3 p-3 rounded-lg border ${
                            flag.severity === 'high'
                              ? 'bg-red-50 border-red-200'
                              : 'bg-yellow-50 border-yellow-200'
                          }`}
                        >
                          {flag.severity === 'high' ? (
                            <AlertCircle size={16} className="text-red-500 mt-0.5 flex-shrink-0" />
                          ) : (
                            <AlertTriangle size={16} className="text-yellow-500 mt-0.5 flex-shrink-0" />
                          )}
                          <div className="flex-1">
                            <div className="text-sm text-slate-800">{flag.message}</div>
                            <div className="text-xs text-slate-500 mt-1">Employee: {flag.employee}</div>
                          </div>
                          <span className={`px-2 py-0.5 text-xs font-bold rounded ${
                            flag.severity === 'high' ? 'bg-red-200 text-red-800' : 'bg-yellow-200 text-yellow-800'
                          }`}>
                            {flag.severity.toUpperCase()}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ============ DAILY TRENDS TAB ============ */}
        {activeTab === 'trends' && (
          <div className="space-y-4">
            <div className="bg-white rounded-xl shadow-sm p-6">
              <h2 className="text-lg font-bold text-slate-900 mb-4">Daily Service Volume — March 2026</h2>
              <ResponsiveContainer width="100%" height={350}>
                <LineChart data={staffingData.daily}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                  <XAxis
                    dataKey="date"
                    tick={{ fontSize: 10 }}
                    angle={-45}
                    textAnchor="end"
                    height={60}
                    tickFormatter={(d) => d.slice(5)}
                  />
                  <YAxis yAxisId="hours" tick={{ fontSize: 11 }} label={{ value: 'Hours', angle: -90, position: 'insideLeft' }} />
                  <YAxis yAxisId="count" orientation="right" tick={{ fontSize: 11 }} label={{ value: 'Services', angle: 90, position: 'insideRight' }} />
                  <Tooltip
                    labelFormatter={(d) => `Date: ${d}`}
                    formatter={(value, name) => [
                      name === 'Service Hours' ? formatNumber(value) + ' hrs' :
                      name === 'Staff Count' ? value + ' staff' :
                      formatNumber(value),
                      name
                    ]}
                  />
                  <Legend />
                  <Line yAxisId="hours" type="monotone" dataKey="total_hours" name="Service Hours" stroke="#3b82f6" strokeWidth={2} dot={{ r: 3 }} />
                  <Line yAxisId="count" type="monotone" dataKey="employee_count" name="Staff Count" stroke="#22c55e" strokeWidth={2} dot={{ r: 3 }} strokeDasharray="5 5" />
                </LineChart>
              </ResponsiveContainer>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {(() => {
                const daily = staffingData.daily;
                const avgHours = daily.reduce((s, d) => s + d.total_hours, 0) / daily.length;
                const avgServices = daily.reduce((s, d) => s + d.service_count, 0) / daily.length;
                const avgStaff = daily.reduce((s, d) => s + d.employee_count, 0) / daily.length;
                return [
                  { label: 'Avg Daily Service Hours', value: avgHours.toFixed(1), color: 'blue' },
                  { label: 'Avg Daily Services', value: Math.round(avgServices).toLocaleString(), color: 'green' },
                  { label: 'Avg Daily Staff', value: avgStaff.toFixed(1), color: 'purple' },
                ].map(m => (
                  <div key={m.label} className={`bg-white rounded-xl shadow-sm p-4 border-l-4 border-${m.color}-500`}>
                    <div className="text-xs text-slate-500">{m.label}</div>
                    <div className={`text-2xl font-bold text-${m.color}-600 mt-1`}>{m.value}</div>
                  </div>
                ));
              })()}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(StaffingDashboard));
  </script>
</body>
</html>
